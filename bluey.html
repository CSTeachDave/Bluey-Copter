<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fly The Copter</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
  <style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  * { font-family: 'Press Start 2P', monospace; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-black">
  <canvas id="game"></canvas>
  <script>
const defaultConfig = {
  game_title: "Bluey's Helicopter",
  background_color: "#87CEEB",
  surface_color: "#FF6B9D",
  text_color: "#2C3E50",
  primary_action_color: "#E63946",
  secondary_action_color: "#FFD60A"
};

let config = { ...defaultConfig };

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (c) => {
    config = { ...defaultConfig, ...c };
  },
  mapToCapabilities: (c) => ({
    recolorables: [
      { get: () => c.background_color || defaultConfig.background_color, set: v => { c.background_color = v; window.elementSdk.setConfig({ background_color: v }); }},
      { get: () => c.surface_color || defaultConfig.surface_color, set: v => { c.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }},
      { get: () => c.text_color || defaultConfig.text_color, set: v => { c.text_color = v; window.elementSdk.setConfig({ text_color: v }); }},
      { get: () => c.primary_action_color || defaultConfig.primary_action_color, set: v => { c.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); }},
      { get: () => c.secondary_action_color || defaultConfig.secondary_action_color, set: v => { c.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); }}
    ],
    borderables: [],
    fontEditable: undefined,
    fontSizeable: undefined
  }),
  mapToEditPanelValues: (c) => new Map([["game_title", c.game_title || defaultConfig.game_title]])
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
const STATE = { MENU: 0, PLAYING: 1, DEAD: 2 };
let state = STATE.MENU;
let score = 0;
let highScore = 0;
let frameCount = 0;

// Helicopter
let heli = { x: 0, y: 0, vy: 0, w: 40, h: 20 };
const GRAVITY = 0.35;
const LIFT = -0.65;
let pressing = false;

// Obstacles - pillars with gaps
let obstacles = [];
let obstacleTimer = 0;

// Particles for exhaust
let particles = [];

function resetGame() {
  heli.x = W * 0.15;
  heli.y = H * 0.5;
  heli.vy = 0;
  obstacles = [];
  particles = [];
  obstacleTimer = 0;
  score = 0;
  frameCount = 0;
}

function getGapSize() {
  // Gap shrinks gradually as score increases, starts generous
  return Math.max(120, H * 0.45 - score * 0.5);
}

function getSpeed() {
  return 2 + score * 0.005;
}

function getSpawnRate() {
  // Obstacles spawn more slowly at first
  return Math.max(70, 150 - score * 0.2);
}

function spawnObstacle() {
  const gap = getGapSize();
  const minY = 40;
  const maxY = H - 40 - gap;
  const gapY = minY + Math.random() * (maxY - minY);
  obstacles.push({
    x: W + 10,
    gapY,
    gapH: gap,
    w: 38 + Math.random() * 16,
    scored: false
  });
}

function drawHeli(x, y) {
  const c1 = config.primary_action_color;
  const c2 = config.secondary_action_color;
  ctx.save();
  // Body
  ctx.fillStyle = c1;
  ctx.beginPath();
  ctx.ellipse(x, y, heli.w / 2, heli.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  // Cockpit
  ctx.fillStyle = c2;
  ctx.beginPath();
  ctx.ellipse(x + 10, y - 2, 8, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // Tail
  ctx.fillStyle = c1;
  ctx.fillRect(x - heli.w / 2 - 14, y - 3, 18, 6);
  // Tail rotor
  ctx.fillStyle = c2;
  const tailSpin = Math.sin(frameCount * 0.5) * 8;
  ctx.fillRect(x - heli.w / 2 - 15, y - tailSpin, 3, tailSpin * 2);
  // Main rotor
  const rotorPhase = Math.sin(frameCount * 0.8);
  ctx.strokeStyle = c2;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 26 * rotorPhase, y - heli.h / 2 - 4);
  ctx.lineTo(x + 26 * rotorPhase, y - heli.h / 2 - 4);
  ctx.stroke();
  // Rotor mast
  ctx.fillStyle = c1;
  ctx.fillRect(x - 1.5, y - heli.h / 2 - 4, 3, 5);
  ctx.restore();
}

function spawnParticle() {
  particles.push({
    x: heli.x - heli.w / 2 - 10,
    y: heli.y + (Math.random() - 0.5) * 8,
    vx: -1.5 - Math.random(),
    vy: (Math.random() - 0.5) * 0.5,
    life: 20 + Math.random() * 15,
    maxLife: 35
  });
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function drawBg() {
  const bg = hexToRgb(config.background_color);
  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, config.background_color);
  grad.addColorStop(1, `rgba(${Math.min(255,bg.r+30)},${Math.min(255,bg.g+20)},${Math.min(255,bg.b+10)},1)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Scrolling stars
  ctx.fillStyle = config.text_color;
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 137 + frameCount * 0.3 * ((i % 3) + 1)) % (W + 20)) - 10;
    const sy = (i * 97.3) % H;
    const sz = 1 + (i % 3) * 0.5;
    ctx.globalAlpha = 0.15 + (i % 5) * 0.08;
    ctx.fillRect(sx, sy, sz, sz);
  }
  ctx.globalAlpha = 1;
}

function drawObstacles() {
  const sf = config.surface_color;
  const sfRgb = hexToRgb(sf);
  obstacles.forEach(o => {
    // Top pillar
    const topGrad = ctx.createLinearGradient(o.x, 0, o.x + o.w, 0);
    topGrad.addColorStop(0, sf);
    topGrad.addColorStop(0.5, `rgba(${Math.min(255,sfRgb.r+40)},${Math.min(255,sfRgb.g+40)},${Math.min(255,sfRgb.b+30)},1)`);
    topGrad.addColorStop(1, sf);
    ctx.fillStyle = topGrad;
    ctx.fillRect(o.x, 0, o.w, o.gapY);
    // Bottom pillar
    ctx.fillRect(o.x, o.gapY + o.gapH, o.w, H - o.gapY - o.gapH);
    // Lip details
    ctx.fillStyle = config.secondary_action_color;
    ctx.fillRect(o.x - 3, o.gapY - 6, o.w + 6, 6);
    ctx.fillRect(o.x - 3, o.gapY + o.gapH, o.w + 6, 6);
  });
}

function checkCollision() {
  // Ceiling / floor
  if (heli.y - heli.h / 2 <= 0 || heli.y + heli.h / 2 >= H) return true;
  // Obstacles (simple AABB)
  const hx1 = heli.x - heli.w / 2 + 4;
  const hx2 = heli.x + heli.w / 2 - 4;
  const hy1 = heli.y - heli.h / 2 + 3;
  const hy2 = heli.y + heli.h / 2 - 3;
  for (const o of obstacles) {
    if (hx2 > o.x && hx1 < o.x + o.w) {
      if (hy1 < o.gapY || hy2 > o.gapY + o.gapH) return true;
    }
  }
  return false;
}

function update() {
  frameCount++;
  if (state === STATE.PLAYING) {
    // Physics
    if (pressing) heli.vy += LIFT;
    heli.vy += GRAVITY;
    heli.vy = Math.max(-7, Math.min(7, heli.vy));
    heli.y += heli.vy;

    // Obstacles
    const speed = getSpeed();
    obstacleTimer++;
    if (obstacleTimer >= getSpawnRate()) {
      spawnObstacle();
      obstacleTimer = 0;
    }
    obstacles.forEach(o => o.x -= speed);
    // Score when passing
    obstacles.forEach(o => {
      if (!o.scored && o.x + o.w < heli.x) {
        o.scored = true;
        score += 10;
      }
    });
    obstacles = obstacles.filter(o => o.x + o.w > -10);

    // Continuous score
    if (frameCount % 5 === 0) score++;

    // Particles
    if (frameCount % 2 === 0) spawnParticle();
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
    particles = particles.filter(p => p.life > 0);

    if (checkCollision()) {
      state = STATE.DEAD;
      if (score > highScore) highScore = score;
    }
  }
}

function draw() {
  drawBg();

  if (state === STATE.MENU) {
    const title = config.game_title || defaultConfig.game_title;
    ctx.fillStyle = config.primary_action_color;
    ctx.font = `${Math.min(28, W * 0.04)}px 'Press Start 2P'`;
    ctx.textAlign = 'center';
    ctx.fillText(title, W / 2, H * 0.3);

    ctx.fillStyle = config.text_color;
    ctx.font = `${Math.min(12, W * 0.018)}px 'Press Start 2P'`;
    ctx.fillText('Press SPACE or TAP to fly', W / 2, H * 0.48);

    ctx.fillStyle = config.secondary_action_color;
    ctx.font = `${Math.min(10, W * 0.015)}px 'Press Start 2P'`;
    ctx.fillText('Avoid walls and obstacles!', W / 2, H * 0.56);

    if (highScore > 0) {
      ctx.fillStyle = config.primary_action_color;
      ctx.fillText(`HIGH SCORE: ${highScore}`, W / 2, H * 0.66);
    }

    // Draw idle helicopter
    const idleY = H * 0.4 + Math.sin(frameCount * 0.04) * 10;
    drawHeli(W / 2, idleY);
  }

  if (state === STATE.PLAYING || state === STATE.DEAD) {
    drawObstacles();

    // Particles
    particles.forEach(p => {
      const alpha = p.life / p.maxLife;
      const rgb = hexToRgb(config.primary_action_color);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha * 0.6})`;
      ctx.fillRect(p.x, p.y, 3, 3);
    });

    drawHeli(heli.x, heli.y);

    // Score HUD
    ctx.fillStyle = config.text_color;
    ctx.font = `${Math.min(14, W * 0.02)}px 'Press Start 2P'`;
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${score}`, 16, 30);

    // Difficulty indicator
    ctx.font = `${Math.min(8, W * 0.012)}px 'Press Start 2P'`;
    ctx.fillStyle = config.secondary_action_color;
    const level = Math.floor(score / 100) + 1;
    ctx.fillText(`LVL ${level}`, 16, 48);
  }

  if (state === STATE.DEAD) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.fillStyle = config.primary_action_color;
    ctx.font = `${Math.min(24, W * 0.035)}px 'Press Start 2P'`;
    ctx.fillText('GAME OVER', W / 2, H * 0.35);

    ctx.fillStyle = config.text_color;
    ctx.font = `${Math.min(14, W * 0.02)}px 'Press Start 2P'`;
    ctx.fillText(`SCORE: ${score}`, W / 2, H * 0.47);

    ctx.fillStyle = config.secondary_action_color;
    ctx.fillText(`BEST: ${highScore}`, W / 2, H * 0.55);

    ctx.fillStyle = config.text_color;
    ctx.font = `${Math.min(10, W * 0.015)}px 'Press Start 2P'`;
    ctx.fillText('Press SPACE or TAP to retry', W / 2, H * 0.66);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function startInput() {
  pressing = true;
  if (state === STATE.MENU || state === STATE.DEAD) {
    resetGame();
    state = STATE.PLAYING;
  }
}
function stopInput() { pressing = false; }

document.addEventListener('keydown', e => { if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); startInput(); }});
document.addEventListener('keyup', e => { if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); stopInput(); }});

loop();
</script>
